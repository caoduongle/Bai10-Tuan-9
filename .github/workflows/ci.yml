name: Java CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # LỆNH CHECKOUT ĐƯỢC THÊM VÀO ĐÂY (Nằm ngay đầu tiên)
      - name: Checkout mã nguồn
        uses: actions/checkout@v3

      # Các bước cũ giữ nguyên ở bên dưới
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn package
